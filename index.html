<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Graph Viewer</title>

    <!-- Cytoscape -->
    <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        #controls {
            padding: 10px;
            background: #f5f5f5;
        }

        #cy {
            width: 100%;
            height: 90vh;
            display: block;
        }

        input {
            padding: 5px;
        }

        button {
            padding: 5px 10px;
        }
    </style>
</head>
<body>

<div id="controls">
    <input type="text" id="nodeInput" placeholder="Node ID (ex: U1)">
    <button onclick="loadGraph()">Charger</button>
</div>

<div id="cy"></div>

<script>
let cy = cytoscape({
    container: document.getElementById('cy'),

    elements: [],

    style: [
        {
            selector: 'node',
            style: {
                'label': 'data(label)',
                'text-valign': 'center',
                'color': '#fff',
                'background-color': '#666'
            }
        },
        {
            selector: 'edge',
            style: {
                'curve-style': 'bezier',
                'target-arrow-shape': 'triangle',
                'label': 'data(label)',
                'font-size': '10px'
            }
        },

        // couleurs par type
        {
            selector: '[type = "USER"]',
            style: { 'background-color': '#0074D9' }
        },
        {
            selector: '[type = "PRODUCT"]',
            style: { 'background-color': '#2ECC40' }
        },
        {
            selector: '[type = "SELLER"]',
            style: { 'background-color': '#FF4136' }
        }
    ],

    layout: {
        name: 'cose'
    }
});


async function loadGraph() {
    const nodeId = document.getElementById("nodeInput").value;

    if (!nodeId) {
        alert("Entre un node id");
        return;
    }

    try {
        const response = await fetch(`http://localhost:8000/graph/node/${nodeId}`);
        const data = await response.json();

        const elements = [];

        // nodes
        data.nodes.forEach(n => {
            elements.push({
                data: {
                    id: n.id,
                    label: n.label,
                    type: n.type
                }
            });
        });

        // edges
        data.edges.forEach(e => {
            elements.push({
                data: {
                    id: e.src + "_" + e.dst,
                    source: e.src,
                    target: e.dst,
                    label: e.relationship
                }
            });
        });

        cy.elements().remove();
        cy.add(elements);

        cy.layout({ name: 'cose' }).run();

    } catch (err) {
        console.error(err);
        alert("Erreur API");
    }
}
</script>

</body>
</html>
